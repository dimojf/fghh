name: Deploy NFT Zip Parts to Filebase

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Extract All Zip Parts into Single Folder
        run: |
          sudo apt-get install -y unzip
          mkdir -p IcePunks
          unzip -j part1.zip -d IcePunks/
          unzip -j part2.zip -d IcePunks/
          unzip -j part3.zip -d IcePunks/
          unzip -j part4.zip -d IcePunks/
          
      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Runtime Dependencies
        run: npm install form-data axios

      - name: Execute Automated IPFS Upload
        env:
          FILEBASE_TOKEN: ${{ secrets.FILEBASE_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const axios = require('axios');
          const FormData = require('form-data');

          async function run() {
            const folderPath = path.join(process.cwd(), 'IcePunks');
            if (!fs.existsSync(folderPath)) {
              console.error('Target directory not found after extraction.');
              process.exit(1);
            }

            const files = fs.readdirSync(folderPath);
            console.log('Total identified bundle assets:', files.length);

            const form = new FormData();
            files.forEach((file) => {
              const stream = fs.createReadStream(path.join(folderPath, file));
              form.append('file', stream, { filepath: 'IcePunks/' + file });
            });

            console.log('Initiating block transfer to Filebase IPFS Cluster...');
            try {
              const res = await axios.post('https://rpc.filebase.io/api/v0/add?pin=true&recursive=true&wrap-with-directory=false', form, {
                headers: {
                  'Authorization': 'Bearer ' + process.env.FILEBASE_TOKEN,
                  ...form.getHeaders()
                },
                maxContentLength: Infinity,
                maxBodyLength: Infinity
              });

              const lines = res.data.trim().split('\n');
              let rootCID = '';
              for (let i = lines.length - 1; i >= 0; i--) {
                const node = JSON.parse(lines[i]);
                if (node.Name === 'IcePunks' || node.Name === '') {
                  rootCID = node.Hash;
                  break;
                }
              }
              if (!rootCID && lines.length > 0) {
                rootCID = JSON.parse(lines[lines.length - 1]).Hash;
              }

              console.log('\n==================================================');
              console.log('SUCCESS: Immutable Parent Folder Pinned Natively!');
              console.log('==================================================');
              console.log('YOUR ROOT FOLDER CID:', rootCID);
              console.log('IPFS PATH ACCESS URI: ipfs://' + rootCID + '/');
              console.log('==================================================\n');
            } catch (err) {
              console.error('Pipeline processing failed:', err.message);
              if (err.response) console.error(err.response.data);
              process.exit(1);
            }
          }
          run();
          "
